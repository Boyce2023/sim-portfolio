openapi: 3.0.3

info:
  title: Nexus API
  description: |
    REST + WebSocket API for the Nexus multi-agent operating system.
    Exposes the Signal Bus and Truth Store so external agents and tools
    can read and write without direct filesystem access.

    ## Authentication

    Write and admin endpoints require an `X-API-Key` header:
    - **Write key** (`API_WRITE_KEY`): POST signals, ACK, acted
    - **Admin key** (`API_ADMIN_KEY`): price push, future admin ops

    Public (no key required): all GET endpoints under `/api/truth`, `/api/portfolio`,
    `/api/risk`, `/api/health`, `/api/sync`, and WebSocket `/ws/signals`.

    ## Data Hierarchy

    ```
    SSOT: portfolio_state.json
      └─ Truth Store (reference mirror): ~/.claude/nexus/truth/
           ├─ companies/{ticker}.json
           ├─ macro/indicators.json
           └─ portfolio/positions.json (may be stale — check staleness_warning)
    ```

    Always prefer `GET /api/portfolio/state` for trading calculations.
    The Truth Store portfolio positions are a cross-workstream reference layer
    and may lag the SSOT by several days.
  version: "1.0.0"
  contact:
    name: Nexus System

servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://nexus-ai-portfolio.up.railway.app
    description: Railway production

tags:
  - name: Truth Store
    description: Read-only access to the Nexus Truth Store (companies, macro, portfolio positions)
  - name: Portfolio
    description: Portfolio state, performance metrics, trade history
  - name: Signals
    description: Signal Bus — read pending signals, post new signals, manage lifecycle
  - name: Risk
    description: Aggregated risk metrics and dashboard payload
  - name: System
    description: Health check, sync bulletin, price push

components:
  securitySchemes:
    WriteApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: Required for write operations (POST/PUT signals, price push)
    AdminApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: Admin-level key required for /api/prices/push

  schemas:
    # ---- Enums ----

    Confidence:
      type: string
      enum: [high, medium, low]
      description: |
        - high: One-party source (SEC filing, IBKR screenshot, earnings transcript)
        - medium: Secondary source (analyst report, financial media) or cross-validated
        - low: Estimate / inference / single unvalidated agent search result

    SignalPriority:
      type: string
      enum: [critical, high, medium, low]
      description: |
        - critical: Process immediately, expires in 3 days
        - high: Surface proactively, expires in 7 days
        - medium: List on startup, expires in 14 days
        - low: Show on demand, expires in 30 days

    SignalLifecycle:
      type: string
      enum: [pending, read, acted_on, expired, superseded]

    SignalType:
      type: string
      enum:
        - system_sync
        - research_update
        - data_staleness
        - trading_alert
        - contradiction
        - architecture_change
        - task_assignment
        - quality_alert

    WorkstreamID:
      type: string
      enum: [research, trading, tracking, events, interviews, nexus]

    # ---- Truth Store ----

    KeyFact:
      type: object
      required: [claim]
      properties:
        claim:
          type: string
        source:
          type: string
          nullable: true
        source_date:
          type: string
          format: date
          nullable: true
        confidence:
          $ref: "#/components/schemas/Confidence"
        verified:
          type: boolean
          default: false
        tags:
          type: array
          items:
            type: string

    Holding:
      type: object
      properties:
        shares:
          type: number
        avg_cost:
          type: number
        entry_date:
          type: string
          format: date
          nullable: true

    CompanySummary:
      type: object
      properties:
        entity:
          type: string
          example: HSAI
        name:
          type: string
        market:
          type: string
          example: US
        sector:
          type: string
          nullable: true
        position_status:
          type: string
          nullable: true
          example: active_holding
        fact_count:
          type: integer
        verified_count:
          type: integer
        high_confidence_count:
          type: integer
        last_updated:
          type: string
          format: date-time
          nullable: true

    CompanyTruth:
      type: object
      required: [entity, name, market]
      properties:
        entity:
          type: string
          example: HSAI
        name:
          type: string
          example: Hesai Group ADR
        market:
          type: string
          example: US
        exchange:
          type: string
          nullable: true
        sector:
          type: string
          nullable: true
        position_status:
          type: string
          nullable: true
        holding:
          $ref: "#/components/schemas/Holding"
          nullable: true
        key_facts:
          type: array
          items:
            $ref: "#/components/schemas/KeyFact"
        thesis:
          type: string
          nullable: true
        last_updated:
          type: string
          format: date-time
          nullable: true

    MacroIndicator:
      type: object
      properties:
        id:
          type: string
          example: macro-01
        entity:
          type: string
          example: VIX
        category:
          type: string
          example: macro
        claim:
          type: string
        value:
          type: number
          nullable: true
        unit:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        source_date:
          type: string
          format: date
          nullable: true
        last_refreshed:
          type: string
          format: date-time
          nullable: true
        confidence:
          $ref: "#/components/schemas/Confidence"
        verified:
          type: boolean
        stale_after_days:
          type: integer
          default: 1
        yf_command:
          type: string
          nullable: true
          description: CLI command to refresh this indicator
        change:
          type: number
          nullable: true
        change_pct:
          type: number
          nullable: true
        tags:
          type: array
          items:
            type: string

    MacroIndicatorsResponse:
      type: object
      properties:
        metadata:
          type: object
        indicators:
          type: array
          items:
            $ref: "#/components/schemas/MacroIndicator"

    Position:
      type: object
      properties:
        id:
          type: string
        entity:
          type: string
        name:
          type: string
        direction:
          type: string
          enum: [long, short]
        status:
          type: string
          enum: [active, closed, watch]
        market:
          type: string
        quantity:
          type: number
          nullable: true
        entry_price:
          type: number
          nullable: true
        entry_date:
          type: string
          format: date
          nullable: true
        target_price_ref:
          type: string
          nullable: true
        bear_case_ref:
          type: string
          nullable: true
        stop_loss_ref:
          type: string
          nullable: true
        next_catalyst:
          type: string
          nullable: true
        key_edge:
          type: string
          nullable: true
        thesis:
          type: string
          nullable: true
        confidence:
          $ref: "#/components/schemas/Confidence"
        verified:
          type: boolean

    PortfolioPositionsResponse:
      type: object
      properties:
        metadata:
          type: object
          description: Includes staleness_warning when positions may be out of date
        positions:
          type: array
          items:
            $ref: "#/components/schemas/Position"

    PerformanceMetrics:
      type: object
      properties:
        total_return_pct:
          type: number
          nullable: true
        ytd_return_pct:
          type: number
          nullable: true
        realized_pnl:
          type: number
          nullable: true
        unrealized_pnl:
          type: number
          nullable: true
        total_equity_usd:
          type: number
          nullable: true
        total_equity_cny:
          type: number
          nullable: true
        cash_usd:
          type: number
          nullable: true
        cash_cny:
          type: number
          nullable: true
        as_of_date:
          type: string
          nullable: true
        note:
          type: string
          nullable: true

    TradeOutcome:
      type: object
      properties:
        trade_id:
          type: string
        ticker:
          type: string
        market:
          type: string
        direction:
          type: string
          enum: [long, short]
        entry_date:
          type: string
          nullable: true
        entry_price:
          type: number
          nullable: true
        exit_date:
          type: string
          nullable: true
        exit_price:
          type: number
          nullable: true
        quantity:
          type: number
          nullable: true
        realized_pnl_usd:
          type: number
          nullable: true
        status:
          type: string
          enum: [closed, open]
        rules_relevant:
          type: array
          items:
            type: string
        rules_complied:
          type: array
          items:
            type: string
        rules_violated:
          type: array
          items:
            type: string
        compliance_note:
          type: string
          nullable: true
        quadrant:
          type: string
          enum: [Q1, Q2, Q3, Q4, Q1_pending, Q3_pending]
          nullable: true
          description: |
            Nexus scorecard quadrant:
            - Q1: Rule followed + positive outcome (target >50%)
            - Q2: Rule violated + positive outcome (lucky)
            - Q3: Rule followed + negative outcome (review rule)
            - Q4: Rule violated + negative outcome (target <15%)
        quadrant_rationale:
          type: string
          nullable: true
        shadow_portfolio_note:
          type: string
          nullable: true
        pre_nexus:
          type: boolean
          default: false

    TradeOutcomesResponse:
      type: object
      properties:
        meta:
          type: object
        trades:
          type: array
          items:
            $ref: "#/components/schemas/TradeOutcome"

    # ---- Signals ----

    SignalPayload:
      type: object
      additionalProperties: true
      properties:
        action:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
        bulletin_version:
          type: string
          nullable: true
        files_to_reread:
          type: array
          items:
            type: string
          nullable: true
        data:
          type: object
          nullable: true

    Signal:
      type: object
      required: [id, from, to, priority, type, created_at, lifecycle]
      properties:
        id:
          type: string
          example: sig-20260521-070000-nexus-system_sync
        from:
          type: string
          example: nexus
        to:
          type: array
          items:
            type: string
          example: [research, trading]
        priority:
          $ref: "#/components/schemas/SignalPriority"
        type:
          $ref: "#/components/schemas/SignalType"
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true
        payload:
          $ref: "#/components/schemas/SignalPayload"
        lifecycle:
          $ref: "#/components/schemas/SignalLifecycle"
        read_by:
          type: string
          nullable: true
        read_at:
          type: string
          format: date-time
          nullable: true
        acted_on_at:
          type: string
          format: date-time
          nullable: true
        action_result:
          type: string
          nullable: true
        superseded_by:
          type: string
          nullable: true

    SignalCreateRequest:
      type: object
      required: [from, to, priority, type, payload]
      properties:
        from:
          type: string
          description: Sender workstream or external agent ID
          example: tracking
        to:
          type: array
          items:
            type: string
          description: Recipient workstream IDs. Use ["all"] to broadcast.
          example: [research, trading]
        priority:
          $ref: "#/components/schemas/SignalPriority"
        type:
          $ref: "#/components/schemas/SignalType"
        payload:
          $ref: "#/components/schemas/SignalPayload"
        expires_in_hours:
          type: integer
          nullable: true
          description: |
            Override default TTL. Defaults:
            critical=72h, high=168h, medium=336h, low=720h

    SignalListResponse:
      type: object
      properties:
        total:
          type: integer
        signals:
          type: array
          items:
            $ref: "#/components/schemas/Signal"

    SignalAckRequest:
      type: object
      required: [read_by]
      properties:
        read_by:
          type: string
          description: Workstream or agent ID acknowledging the signal

    SignalActedRequest:
      type: object
      required: [acted_by, action_result]
      properties:
        acted_by:
          type: string
        action_result:
          type: string
          description: Human-readable summary of action taken

    # ---- Risk ----

    RiskMetrics:
      type: object
      properties:
        total_positions:
          type: integer
        active_long_count:
          type: integer
        active_short_count:
          type: integer
        concentration_top3_pct:
          type: number
          nullable: true
        bear_case_breach_count:
          type: integer
          description: Positions where bear case downside > 20% (Nexus Rule S2)
        stale_truth_count:
          type: integer
          description: Company truth entries not updated in >30 days
        pending_signal_count:
          type: integer
        quality_alert:
          type: boolean
          description: True when pending_signal_count >= 10
        scorecard_q4_pct:
          type: number
          nullable: true
          description: "% closed trades in Q4 (target: <15%)"
        scorecard_q1_pct:
          type: number
          nullable: true
          description: "% closed trades in Q1 (target: >50%)"
        as_of:
          type: string
          format: date-time

    # ---- System ----

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded, error]
        version:
          type: string
        truth_store_files:
          type: integer
        signals_pending:
          type: integer
        signals_processed:
          type: integer
        stale_indicators:
          type: array
          items:
            type: string
        timestamp:
          type: string
          format: date-time

    SyncBulletin:
      type: object
      properties:
        version:
          type: string
        released_at:
          type: string
          format: date-time
          nullable: true
        summary:
          type: string
          nullable: true
        files_updated:
          type: array
          items:
            type: string
        breaking_changes:
          type: array
          items:
            type: string
        migration_steps:
          type: array
          items:
            type: string

    APIError:
      type: object
      properties:
        error:
          type: string
        detail:
          type: string
          nullable: true
        code:
          type: string
          nullable: true

paths:
  # ===========================================================================
  # Truth Store — Companies
  # ===========================================================================

  /api/truth/companies:
    get:
      tags: [Truth Store]
      summary: List all company truth entries
      description: |
        Returns a summary of every company JSON in `{NEXUS_ROOT}/truth/companies/`.
        Uses `_index.json` for O(1) fact counts; enriches names from individual files.
      operationId: listCompanies
      responses:
        "200":
          description: Array of company summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CompanySummary"
              example:
                - entity: HSAI
                  name: Hesai Group ADR
                  market: US
                  sector: LiDAR / Automotive Sensors
                  position_status: active_holding
                  fact_count: 18
                  verified_count: 9
                  high_confidence_count: 12
                  last_updated: "2026-05-20T10:00:00+08:00"

  /api/truth/companies/{ticker}:
    get:
      tags: [Truth Store]
      summary: Get full truth entry for a company
      operationId: getCompany
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
          description: |
            US tickers: uppercase (e.g. HSAI, NVDA)
            A-shares: 6-digit code (e.g. 002028, 600089)
            HK: e.g. 2525HK
          example: HSAI
      responses:
        "200":
          description: Full company truth object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyTruth"
        "404":
          description: Company not found in Truth Store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

  # ===========================================================================
  # Truth Store — Macro
  # ===========================================================================

  /api/truth/macro/indicators:
    get:
      tags: [Truth Store]
      summary: Get macro indicators
      description: |
        Reads `{NEXUS_ROOT}/truth/macro/indicators.json`.
        Values are from last `yf` refresh — check `last_refreshed` before use.
      operationId: getMacroIndicators
      parameters:
        - name: stale_only
          in: query
          schema:
            type: boolean
            default: false
          description: Return only indicators that have exceeded their `stale_after_days` threshold
        - name: tag
          in: query
          schema:
            type: string
          description: "Filter by tag (e.g. volatility, fx, rates, energy)"
      responses:
        "200":
          description: Macro indicators response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MacroIndicatorsResponse"

  # ===========================================================================
  # Truth Store — Portfolio (reference layer)
  # ===========================================================================

  /api/truth/portfolio/positions:
    get:
      tags: [Truth Store]
      summary: Portfolio positions (Truth Store reference layer)
      description: |
        **Not the SSOT.** Use `GET /api/portfolio/state` for trading calculations.
        This endpoint returns the Truth Store mirror which may lag by several days.
        Check `metadata.staleness_warning` in the response.
      operationId: getTruthPortfolio
      responses:
        "200":
          description: Portfolio positions with metadata including staleness info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioPositionsResponse"

  # ===========================================================================
  # Portfolio — SSOT
  # ===========================================================================

  /api/portfolio/state:
    get:
      tags: [Portfolio]
      summary: Current portfolio state (SSOT — use for all calculations)
      description: |
        Reads `portfolio_state.json` directly. Returns raw JSON; schema varies by version.
        This is the authoritative source for P&L, position sizing, and cost basis.
      operationId: getPortfolioState
      responses:
        "200":
          description: Raw portfolio state JSON
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: portfolio_state.json not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

  /api/portfolio/performance:
    get:
      tags: [Portfolio]
      summary: Structured performance metrics
      description: Extracts and normalizes top-level metrics from portfolio_state.json.
      operationId: getPerformance
      responses:
        "200":
          description: Performance metrics (nulls where SSOT lacks that key)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerformanceMetrics"

  /api/portfolio/trades:
    get:
      tags: [Portfolio]
      summary: Closed trade outcomes with Nexus scorecard quadrant
      operationId: getTrades
      parameters:
        - name: quadrant
          in: query
          schema:
            type: string
            enum: [Q1, Q2, Q3, Q4, Q1_pending, Q3_pending]
          description: Filter by Nexus scorecard quadrant
        - name: ticker
          in: query
          schema:
            type: string
          description: Filter by ticker (case-insensitive)
        - name: market
          in: query
          schema:
            type: string
            enum: [US, CN, HK]
          description: Filter by market
        - name: include_pre_nexus
          in: query
          schema:
            type: boolean
            default: true
          description: Include trades logged before Nexus was deployed
      responses:
        "200":
          description: Trade outcomes with scorecard metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeOutcomesResponse"

  /api/portfolio/trades.csv:
    get:
      tags: [Portfolio]
      summary: Download trade outcomes as CSV
      operationId: getTradesCsv
      responses:
        "200":
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string
              example: |
                trade_id,ticker,market,direction,entry_date,entry_price,...

  # ===========================================================================
  # Risk
  # ===========================================================================

  /api/risk/metrics:
    get:
      tags: [Risk]
      summary: Aggregated risk metrics
      description: |
        Computes risk signals from Truth Store, Signal Bus, and trade outcomes.
        All operations are read-only. Key indicators:
        - `quality_alert`: true when pending signals >= 10 (Nexus rule)
        - `bear_case_breach_count`: positions violating the >20% downside rule
        - `scorecard_q4_pct`: should be <15% (clear system failures)
      operationId: getRiskMetrics
      responses:
        "200":
          description: Risk metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskMetrics"

  /api/risk/dashboard:
    get:
      tags: [Risk]
      summary: Composite dashboard payload (metrics + top signals + top positions)
      description: |
        Bundles risk metrics, the 3 highest-priority pending signals, and the
        5 top active positions into one response — one network round-trip for
        a risk dashboard UI.
      operationId: getRiskDashboard
      responses:
        "200":
          description: Dashboard payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  metrics:
                    $ref: "#/components/schemas/RiskMetrics"
                  top_signals:
                    type: array
                    items:
                      $ref: "#/components/schemas/Signal"
                  top_positions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Position"
                  generated_at:
                    type: string
                    format: date-time

  # ===========================================================================
  # Signals
  # ===========================================================================

  /api/signals/pending:
    get:
      tags: [Signals]
      summary: List pending signals
      operationId: listPendingSignals
      parameters:
        - name: to
          in: query
          schema:
            type: string
          description: Filter by recipient workstream ID
          example: research
        - name: priority
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low]
          description: Filter by priority level
        - name: type
          in: query
          schema:
            type: string
          description: Filter by signal type
          example: system_sync
      responses:
        "200":
          description: Pending signals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalListResponse"

  /api/signals:
    post:
      tags: [Signals]
      summary: Post a new signal to the bus
      description: |
        Creates a new signal JSON in `{NEXUS_ROOT}/signals/pending/`.
        Broadcasts to all `/ws/signals` WebSocket subscribers.
        Filename: `sig-{YYYYMMDD}-{HHMMSS}-{from}-{type}.json`
      operationId: createSignal
      security:
        - WriteApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalCreateRequest"
            example:
              from: tracking
              to: [research, trading]
              priority: high
              type: data_staleness
              payload:
                action: refresh_required
                message: HSAI price data is 3 days stale
                data:
                  ticker: HSAI
                  last_refreshed: "2026-05-18"
      responses:
        "201":
          description: Signal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Signal"
        "403":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

  /api/signals/{signal_id}/ack:
    put:
      tags: [Signals]
      summary: Acknowledge (mark as read) a signal
      description: |
        Sets `lifecycle=read`, `read_by`, and `read_at`.
        Signal stays in `pending/` — call `/acted` to complete lifecycle.
      operationId: ackSignal
      security:
        - WriteApiKey: []
      parameters:
        - name: signal_id
          in: path
          required: true
          schema:
            type: string
          example: sig-20260521-070000-nexus-system_sync
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalAckRequest"
      responses:
        "200":
          description: Signal updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Signal"
        "404":
          description: Signal not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

  /api/signals/{signal_id}/acted:
    put:
      tags: [Signals]
      summary: Mark a signal as acted on and move to processed/
      description: |
        Completes signal lifecycle:
        1. Sets `lifecycle=acted_on`, `acted_on_at`, `action_result`
        2. Moves file from `signals/pending/` → `signals/processed/`
      operationId: actedSignal
      security:
        - WriteApiKey: []
      parameters:
        - name: signal_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalActedRequest"
      responses:
        "200":
          description: Signal moved to processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Signal"
        "404":
          description: Signal not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "409":
          description: Signal already in processed/
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

  # ===========================================================================
  # System
  # ===========================================================================

  /api/health:
    get:
      tags: [System]
      summary: System health check
      operationId: health
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                version: "1.0.0"
                truth_store_files: 47
                signals_pending: 5
                signals_processed: 23
                stale_indicators: [VIX, DXY]
                timestamp: "2026-05-21T07:00:00Z"

  /api/sync/bulletin:
    get:
      tags: [System]
      summary: Latest Nexus update bulletin
      description: |
        Reads `{NEXUS_ROOT}/sync/update-bulletin.json`. External agents should
        check this on startup and follow `migration_steps` if their version
        differs from `version`.
      operationId: getBulletin
      responses:
        "200":
          description: Current bulletin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncBulletin"

  /api/prices/push:
    post:
      tags: [System]
      summary: Push a price update to all /ws/prices subscribers (admin)
      description: |
        Used by the `yf` polling script. Fans out price ticks to all WebSocket
        price subscribers. Does not persist data.
      operationId: pushPrice
      security:
        - AdminApiKey: []
      parameters:
        - name: ticker
          in: query
          required: true
          schema:
            type: string
          example: NVDA
        - name: price
          in: query
          required: true
          schema:
            type: number
          example: 132.50
        - name: change_pct
          in: query
          schema:
            type: number
            nullable: true
          example: 1.23
      responses:
        "200":
          description: Price broadcasted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  subscribers:
                    type: integer
        "403":
          description: Admin key required

# ===========================================================================
# WebSocket channels (informational — not part of OAS 3.0 formally)
# ===========================================================================
# ws://host/ws/signals
#   Protocol: JSON messages
#   Server → client: {"event": "new_signal", "signal": <Signal>}
#   Client → server: {"action": "ping"}  →  {"action": "pong"}
#   No auth required (deploy behind TLS + IP allowlist for production)
#
# ws://host/ws/prices
#   Protocol: JSON messages
#   Server → client: {"ticker": "NVDA", "price": 132.50, "change_pct": 1.23, "ts": "..."}
#   Server → client (heartbeat every 30s): {"action": "heartbeat"}
#   No auth required on channel; producers must use /api/prices/push (admin key)
