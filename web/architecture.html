function isWide(ch) {
  const c = ch.codePointAt(0);
  if (c >= 0x4E00 && c <= 0x9FFF) return true;  // CJK Unified
  if (c >= 0x3400 && c <= 0x4DBF) return true;  // CJK Ext A
  if (c >= 0xF900 && c <= 0xFAFF) return true;  // CJK Compat
  if (c >= 0xFF01 && c <= 0xFF60) return true;  // Fullwidth
  if (c >= 0x3000 && c <= 0x303F) return true;  // CJK Symbols
  if (c >= 0x3040 && c <= 0x30FF) return true;  // Hiragana/Katakana
  if (c >= 0x2E80 && c <= 0x2FDF) return true;  // Radicals
  return false;
}

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;

const fontSize = 14;
const fontASCII = fontSize + 'px Menlo, Monaco, "Courier New", monospace';
const fontCJK = fontSize + 'px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif';

ctx.font = fontASCII;
const cellW = ctx.measureText('M').width;
const cellH = Math.round(fontSize * 1.55);

// calculate max columns
let maxCols = 0;
text.forEach(line => {
  let cols = 0;
  for (const ch of line) { cols += isWide(ch) ? 2 : 1; }
  if (cols > maxCols) maxCols = cols;
});

const padX = 24, padY = 20;
const W = Math.ceil(maxCols * cellW + padX * 2);
const H = Math.ceil(text.length * cellH + padY * 2);

canvas.width = W * dpr;
canvas.height = H * dpr;
canvas.style.width = W + 'px';
canvas.style.height = H + 'px';
ctx.scale(dpr, dpr);

// white bg
ctx.fillStyle = '#ffffff';
ctx.fillRect(0, 0, W, H);

// render char by char
ctx.textBaseline = 'top';
text.forEach((line, row) => {
  let col = 0;
  for (const ch of line) {
    const x = padX + col * cellW;
    const y = padY + row * cellH;
    const wide = isWide(ch);

    ctx.font = wide ? fontCJK : fontASCII;
    ctx.fillStyle = '#1a1a1a';

    if (wide) {
      // center CJK char within 2-cell space
      const glyphW = ctx.measureText(ch).width;
      const slotW = cellW * 2;
      ctx.fillText(ch, x + (slotW - glyphW) / 2, y);
    } else {
      ctx.fillText(ch, x, y);
    }

    col += wide ? 2 : 1;
  }
});

function saveImage(){
  const a = document.createElement('a');
